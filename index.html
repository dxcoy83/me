    (function() {
      const text = '@dxcoy';
      let i = 0, deleting = false;
      function tick() {
        document.title = text.slice(0, i) + (i % 2 === 0 && deleting || !deleting ? '|' : '');
        if (!deleting) {
          i++;
          if (i > text.length) { deleting = true; setTimeout(tick, 1800); return; }
          setTimeout(tick, 120);
        } else {
          i--;
          if (i < 0) { i = 0; deleting = false; setTimeout(tick, 500); return; }
          setTimeout(tick, 110);
        }
      }
      tick();
    })();
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100vh;
      background: #0d0d0d;
      font-family: 'Geist', sans-serif;
      color: #e0ddd8;
      overflow-x: hidden;
    }

    /* BG VIDEO */
    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    #bgVideo.show {
      opacity: 0.35;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;

    }

    .bg-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 240px;
      background-size: cover;
      background-position: center;
      opacity: 0;
      z-index: 2;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #0d0d0d;
      cursor: default;
      transition: opacity 0.9s ease;
      user-select: none;
    }

    #splash.ready { cursor: pointer; }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-text {
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.18);
      transition: color 0.6s ease;
    }

    .splash-text.ready {
      color: rgba(255, 255, 255, 0.28);
      animation: blink 2.2s ease-in-out infinite;
    }

    .splash-sub {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.1);
      letter-spacing: 0.1em;

    .splash-loader {

      width: 240px;

      border-radius: 2px;
      overflow: hidden;
    }

    .splash-loader-bar {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), background 0.6s ease, box-shadow 0.6s ease;
    }

    .splash-loader-bar.done {
      background: rgba(255,255,255,0.65);
      box-shadow: 0 0 10px rgba(255,255,255,0.25), 0 0 20px rgba(255,255,255,0.08);
    }

    .splash-loader-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.18);
      text-align: center;
      transition: color 0.5s ease;
      white-space: nowrap;
    }

    .splash-loader-label.done {
      color: rgba(255,255,255,0.5);
    }

    @keyframes blink {
      0%, 100% { opacity: .28 }
      50%       { opacity: .65 }
    }

    /* MAIN */
    #main {
      position: relative;
      z-index: 4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 24px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
    }

    #main.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .inner {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(13, 13, 13, 0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 18px 18px 16px;
    }

    /* Discord Banner inside card — full-width header like biscuit */
    .card-banner {
      width: calc(100% + 36px);
      margin: -18px -18px 0;
      height: 130px;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      position: relative;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .card-banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .card-banner-img.loaded {
      opacity: 1;
    }

    .card-banner-color {
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .card-banner-color.loaded {
      opacity: 1;
    }

    .card-banner-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(13,13,13,0.55));
      pointer-events: none;
    }

    /* Avatar — always shown, overlaps banner bottom when banner present */
    .avatar-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .avatar-wrap.has-banner {
      margin-top: -32px;
      z-index: 2;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #1c1c1c;
      border: 2px solid rgba(255, 255, 255, 0.07);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: rgba(255, 255, 255, 0.12);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2.5px solid #0d0d0d;
      background: #747f8d;
      transition: background 0.5s;
    }

    .status-dot.online {
      background: #3ba55c;
    }

    .status-dot.idle {
      background: #faa61a;
    }

    .status-dot.dnd {
      background: #ed4245;
    }

    .status-dot.offline {
      background: #747f8d;
    }

    .name {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.01em;
      margin-bottom: 3px;
      text-align: center;
    }

    .handle {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.07em;
      margin-bottom: 4px;
    }

    .status-text {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-style: italic;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      text-align: center;
      min-height: 14px;
      transition: opacity 0.4s;
    }

    /* Quotes */
    .quote-wrap {
      width: 100%;
      margin-bottom: 8px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quote {
      font-family: 'Geist', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.22);
      line-height: 1.6;
      text-align: center;
      max-width: 300px;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .cursor {
      display: inline-block;
      width: 1.5px;
      height: 12px;
      background: rgba(255, 255, 255, 0.25);
      margin-left: 1px;
      vertical-align: middle;
      animation: cur 0.9s step-end infinite;
    }

    @keyframes cur {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* Presence blocks */
    .presence-block {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.02);
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }

    .presence-block.show {
      display: flex;
    }

    /* ── RICH ACTIVITY BLOCKS ─────────────────────────────────────────────── */
    #activityWrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 7px;
    }

    .rich-act {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.02);
      display: none;
      flex-direction: column;
      gap: 8px;
      animation: act-in 0.35s ease;
    }

    @keyframes act-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rich-act.show { display: flex; }

    .rich-act-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Image area: large image with optional small badge overlay */
    .rich-act-imgs {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .rich-act-large {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #1a1a1a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .rich-act-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Small icon badge in bottom-right corner */
    .rich-act-small {
      position: absolute;
      bottom: -3px;
      right: -3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #0d0d0d;
      overflow: hidden;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .rich-act-small.show { display: flex; }

    .rich-act-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .rich-act-info {
      flex: 1;
      min-width: 0;
    }

    .rich-act-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.18);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .rich-act-name {
      font-size: 12.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .rich-act-detail,
    .rich-act-state {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.28);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    /* Elapsed time */
    .rich-act-elapsed {
      font-family: 'Geist Mono', monospace;
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.18);
      margin-top: 2px;
    }

    /* Optional progress bar for timed activities */
    .rich-act-bar-wrap {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .rich-act-bar-wrap.show { display: block; }

    .rich-act-bar-fill {
      height: 100%;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* EQ / Spotify */
    .eq {
      display: flex;
      align-items: flex-end;
      gap: 2.5px;
      height: 16px;
      flex-shrink: 0;
    }

    .eq-bar {
      width: 2.5px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.28);
      animation: eq 0.8s ease-in-out infinite alternate;
    }

    .eq-bar:nth-child(1) {
      height: 5px;
      animation-delay: 0s
    }

    .eq-bar:nth-child(2) {
      height: 12px;
      animation-delay: .12s
    }

    .eq-bar:nth-child(3) {
      height: 7px;
      animation-delay: .28s
    }

    .eq-bar:nth-child(4) {
      height: 14px;
      animation-delay: .06s
    }

    @keyframes eq {
      from {
        transform: scaleY(.3)
      }

      to {
        transform: scaleY(1)
      }
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-family: 'Geist Mono', monospace;
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.52);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .track-artist {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.22);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-src {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    /* LYRICS PLAYER */
    #lyricsPlayer {
      width: 100%;
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }

    .lp-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .lp-art {
      width: 32px;
      height: 32px;
      border-radius: 5px;
      background: #1a1a1a;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .lp-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .lp-info {
      flex: 1;
      min-width: 0;
    }

    .lp-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lp-artist {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.22);
      margin-top: 2px;
    }

    .lp-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lp-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 14px;
      transition: color .2s;
      display: flex;
      align-items: center;
    }

    .lp-btn:hover {
      color: rgba(255, 255, 255, 0.75);
    }

    .lp-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Song selector tabs */
    .lp-tabs {
      display: flex;
      gap: 6px;
      padding: 7px 12px 0;
    }

    .lp-tab {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: transparent;
      color: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: all .2s;
    }

    .lp-tab.active {
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Lyrics scroll area */
    .lp-lyrics {
      height: 110px;
      overflow-y: scroll;
      padding: 8px 14px;
      overscroll-behavior: contain;
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
    }

    .lp-lyrics::-webkit-scrollbar {
      display: none;
    }

    .lyric-line {
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.7;
      text-align: center;
      cursor: pointer;
      padding: 1px 0;
      opacity: 0.15;
      transition: opacity 0.35s ease, text-shadow 0.35s ease;
      will-change: opacity;
    }

    .lyric-line.active {
      opacity: 1;
      text-shadow: 0 0 22px rgba(255, 255, 255, 0.18);
    }

    .lyric-line.past {
      opacity: 0.22;
      transition: opacity 0.5s ease, text-shadow 0.5s ease;
    }

    /* Progress / duration */
    .lp-progress {
      padding: 4px 12px 8px;
    }

    .lp-time-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .lp-time {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.05em;
    }

    .lp-bar-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .lp-bar-wrap:hover {
      height: 5px;
      margin-top: -1px;
    }

    .lp-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.5);
      width: 0%;
      pointer-events: none;
    }

    /* Audio Visualizer - canvas based for smooth rendering */
    .lp-visualizer {
      width: 100%;
      height: 72px;
      padding: 0 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    #vizCanvas {
      width: 100%;
      height: 72px;
      display: block;
      border-radius: 4px;
      image-rendering: pixelated;
    }

    /* Custom cursor */
    * { cursor: none !important; }

    #customCursor {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.45);
      box-shadow: 0 0 10px rgba(255,255,255,0.25), 0 0 20px rgba(255,255,255,0.1);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      will-change: transform;
    }

    #customCursor.clicking {
      width: 12px;
      height: 12px;
      background: rgba(255,255,255,0.3);
    }

    .cursor-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
    }

    @keyframes particle-fade {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.1); }
    }

    @keyframes comet-tail {
      0%   { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, calc(-50% - 18px)) scale(0); }
    }

    .lp-volume-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      padding: 0 1px;
    }

    .vol-icon {
      color: rgba(255,255,255,0.22);
      flex-shrink: 0;
    }

    .vol-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      outline: none;
      cursor: none !important;
      transition: height 0.15s;
    }

    .vol-slider:hover {
      height: 5px;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
      cursor: none !important;
      box-shadow: 0 0 6px rgba(255,255,255,0.3);
      transition: background 0.15s, transform 0.15s;
    }

    .vol-slider::-webkit-slider-thumb:hover {
      background: rgba(255,255,255,0.9);
      transform: scale(1.2);
    }

    .vol-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
      cursor: none !important;
      border: none;
      box-shadow: 0 0 6px rgba(255,255,255,0.3);
    }

    /* Roblox icon - use as-is, no glow */
    .roblox-icon {
      filter: none !important;
      opacity: 0.55;
    }

    .link-item:hover .roblox-icon {
      filter: none !important;
      opacity: 1;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 5px;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 7px;
      background: transparent;
      color: rgba(255, 255, 255, 0.38);
      font-size: 12px;
      font-weight: 300;
      text-decoration: none;
      transition: border-color .22s, color .22s, background .22s;
      letter-spacing: 0.01em;
    }

    .link-item:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.028);
      color: rgba(255, 255, 255, 0.72);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .link-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.55;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.35));
      transition: opacity .22s, filter .22s;
    }

    .link-item:hover .link-icon {
      opacity: 1;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.75));
    }

    .link-arrow {
      font-size: 11px;
      opacity: 0.22;
      transition: opacity .22s, transform .22s;
    }

    .link-item:hover .link-arrow {
      opacity: .55;
      transform: translate(2px, -2px);
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .copyright {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.12);
      letter-spacing: 0.04em;
    }

    .views {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.13);
      letter-spacing: 0.05em;
    }

    .socs {
      display: flex;
      gap: 16px;
    }

    .soc {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.18);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color .2s;
    }

    .soc:hover {
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── SIDEBAR ──────────────────────────────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 50%;
      right: 28px;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: rgba(13,13,13,0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 20px 16px;
      width: 160px;
      opacity: 0;
      transform: translateY(-50%) translateX(20px);
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
    }

    .sidebar.visible {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    .sidebar-title {
      font-family: 'Geist', sans-serif;
      font-size: 10.5px;
      font-weight: 300;
      color: rgba(255,255,255,0.3);
      text-align: center;
      line-height: 1.55;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
      font-style: italic;
    }

    .sidebar-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;

    .mob-overlay {

    .mob-drawer {

    // ── AUDIO PLAYER ──────────────────────────────────────────────────────────
    const audio = document.getElementById('audioEl');
    audio.volume = 0.08;

    let isPlaying = false;

    // Audio preload array — filled by the preloader below
    const preloadedAudio = new Array(SONGS.length).fill(null);

    // ── WEB AUDIO / VISUALIZER (Canvas) ─────────────────────────────────────
    let audioCtx, analyser, source;
    const VIZ_BARS = 48;
    let smoothedViz = new Float32Array(VIZ_BARS);
    let vizCanvas, vizCtx2d, vizLogW, vizLogH;

    // Video color sampling — smooth lerp
    let videoSampleCanvas = document.createElement('canvas');
    let videoSampleCtx = videoSampleCanvas.getContext('2d');
    videoSampleCanvas.width = 16; videoSampleCanvas.height = 16;
    let currentVizColor = { r: 255, g: 255, b: 255 };
    let targetVizColor  = { r: 255, g: 255, b: 255 };
    let lastColorSample = 0;

    function sampleVideoColor() {
      const vid = document.getElementById('bgVideo');
      if (!vid || vid.readyState < 2) return;
      try {
        videoSampleCtx.drawImage(vid, 0, 0, 16, 16);
        const px = videoSampleCtx.getImageData(0, 0, 16, 16).data;
        let r = 0, g = 0, b = 0, n = 0;
        for (let i = 0; i < px.length; i += 4) { r += px[i]; g += px[i+1]; b += px[i+2]; n++; }
        r /= n; g /= n; b /= n;
        const avg = (r+g+b)/3, boost = 2.4;
        r = Math.min(255, avg + (r-avg)*boost);
        g = Math.min(255, avg + (g-avg)*boost);
        b = Math.min(255, avg + (b-avg)*boost);
        const bri = Math.max(r,g,b);
        if (bri < 130) { const sc = 130/Math.max(bri,1); r=Math.min(255,r*sc); g=Math.min(255,g*sc); b=Math.min(255,b*sc); }
        targetVizColor = { r: Math.round(r), g: Math.round(g), b: Math.round(b) };
      } catch(e) {}
    }

    function buildVisualizer() {
      vizCanvas = document.getElementById('vizCanvas');
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const rect = vizCanvas.parentElement.getBoundingClientRect();
      vizLogW = rect.width - 28;
      vizLogH = 72;
      vizCanvas.width  = Math.round(vizLogW * dpr);
      vizCanvas.height = Math.round(vizLogH * dpr);
      vizCanvas.style.width  = vizLogW + 'px';
      vizCanvas.style.height = vizLogH + 'px';
      vizCtx2d = vizCanvas.getContext('2d');
      vizCtx2d.scale(dpr, dpr);
      smoothedViz.fill(0);
    }

    function setupAudioContext() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.8;
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
    }

    let _freqData = null;
    function tickVisualizer() {
      requestAnimationFrame(tickVisualizer);
      if (!vizCtx2d) return;

      const now = Date.now();
      if (now - lastColorSample > 800) { sampleVideoColor(); lastColorSample = now; }
      // (video color kept for potential future use — visualizer now uses card palette)

      // Bar layout
      const barW = 3.5;
      const gap = (vizLogW - VIZ_BARS * barW) / (VIZ_BARS - 1);
      const centerY = vizLogH / 2;
      const maxHalf = vizLogH * 0.46;

      vizCtx2d.clearRect(0, 0, vizLogW, vizLogH);

      // Update smoothed freq data
      if (analyser && isPlaying) {
        if (!_freqData || _freqData.length !== analyser.frequencyBinCount) {
          _freqData = new Uint8Array(analyser.frequencyBinCount);
        }
        analyser.getByteFrequencyData(_freqData);
        const usable = Math.floor(_freqData.length * 0.65);
        const step = usable / VIZ_BARS;
        for (let i = 0; i < VIZ_BARS; i++) {
          let acc = 0, cnt = 0;
          const s = Math.floor(i * step), e = Math.floor((i + 1) * step);
          for (let j = s; j < e && j < _freqData.length; j++) { acc += _freqData[j]; cnt++; }
          const rawNorm = cnt ? acc / cnt / 255 : 0;
          // Gentler power curve so quieter signals still show movement
          const scaled = Math.pow(rawNorm, 1.6);
          // Sweet spot — enough movement without maxing out
          const target = Math.max(1.5, Math.min(maxHalf * 0.70, scaled * maxHalf * 1.85));
          // Slightly snappier attack for more responsive feel
          const atk = scaled > smoothedViz[i] / maxHalf ? 0.22 : 0.12;
          smoothedViz[i] += (target - smoothedViz[i]) * atk;
        }
      } else {
        for (let i = 0; i < VIZ_BARS; i++) {
          const wave = Math.sin(now * 0.0008 + i * 0.35) * 0.5 + Math.sin(now * 0.0013 + i * 0.6) * 0.3;
          const idleH = 2.0 + wave * 1.6;
          smoothedViz[i] += (idleH - smoothedViz[i]) * 0.06;
        }
      }

      // Color palette — matched to profile card:
      // Card bg: rgba(13,13,13,0.55), borders: rgba(255,255,255,0.06)
      // Name text: rgba(255,255,255,0.85), handle: rgba(255,255,255,0.2)
      // We use a warm soft white at low-mid opacity, fading to near-transparent at roots
      const colPeak  = [224, 221, 216]; // #e0ddd8 — matches body text color
      const colMid   = [180, 177, 173]; // slightly dimmer mid tone
      const colRoot  = [ 80,  78,  76]; // dark near-transparent root

      // Draw — bars grow from center up AND down (mirrored)
      for (let i = 0; i < VIZ_BARS; i++) {
        const halfH = Math.max(1.5, smoothedViz[i]);
        const x = i * (barW + gap);
        const norm = halfH / maxHalf;
        const radius = Math.min(barW / 2, halfH / 2, 2);

        // Very subtle glow — same warm white, low alpha
        if (norm > 0.1) {
          vizCtx2d.save();
          vizCtx2d.globalAlpha = norm * 0.10;
          vizCtx2d.fillStyle = `rgb(${colPeak[0]},${colPeak[1]},${colPeak[2]})`;
          vizCtx2d.beginPath();
          vizCtx2d.roundRect(x - 2, centerY - halfH - 1, barW + 4, halfH * 2 + 2, radius + 2);
          vizCtx2d.fill();
          vizCtx2d.restore();
        }

        vizCtx2d.globalAlpha = 1;

        // Top bar — bright peak fading to dim root at center
        const gradUp = vizCtx2d.createLinearGradient(x, centerY - halfH, x, centerY);
        gradUp.addColorStop(0,   `rgba(${colPeak[0]},${colPeak[1]},${colPeak[2]},${Math.min(0.78, 0.38 + norm * 0.40)})`);
        gradUp.addColorStop(0.5, `rgba(${colMid[0]},${colMid[1]},${colMid[2]},${0.18 + norm * 0.22})`);
        gradUp.addColorStop(1,   `rgba(${colRoot[0]},${colRoot[1]},${colRoot[2]},0.06)`);
        vizCtx2d.fillStyle = gradUp;
        vizCtx2d.beginPath();
        vizCtx2d.roundRect(x, centerY - halfH, barW, halfH, [radius, radius, 0, 0]);
        vizCtx2d.fill();

        // Bottom bar — mirror of top
        const gradDown = vizCtx2d.createLinearGradient(x, centerY, x, centerY + halfH);
        gradDown.addColorStop(0,   `rgba(${colRoot[0]},${colRoot[1]},${colRoot[2]},0.06)`);
        gradDown.addColorStop(0.5, `rgba(${colMid[0]},${colMid[1]},${colMid[2]},${0.18 + norm * 0.22})`);
        gradDown.addColorStop(1,   `rgba(${colPeak[0]},${colPeak[1]},${colPeak[2]},${Math.min(0.78, 0.38 + norm * 0.40)})`);
        vizCtx2d.fillStyle = gradDown;
        vizCtx2d.beginPath();
        vizCtx2d.roundRect(x, centerY, barW, halfH, [0, 0, radius, radius]);
        vizCtx2d.fill();
      }

      // Subtle center divider line — matches card border color
      vizCtx2d.globalAlpha = 0.08;
      vizCtx2d.fillStyle = `rgba(255,255,255,1)`;
      vizCtx2d.fillRect(0, centerY - 0.5, vizLogW, 1);
      vizCtx2d.globalAlpha = 1;
    }

    let lastActiveLine = -1;

    // Use requestAnimationFrame for zero-lag lyric sync instead of timeupdate
    function syncLoop() {
      requestAnimationFrame(syncLoop);
      if (!audio.duration) return;

      const t = audio.currentTime;
      const dur = audio.duration;

      // Update progress bar and time — direct style, no reflow
      const pct = (t / dur * 100).toFixed(2);
      document.getElementById('lpFill').style.width = pct + '%';
      document.getElementById('lpCurrent').textContent = fmtTime(t);

      // Binary-search for active lyric line — +0.08s lookahead compensates for visual lag
      const lyrics = SONGS[currentSong].lyrics;
      const tLook = t + 0.08;
      let lo = 0, hi = lyrics.length - 1, active = -1;
      while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (lyrics[mid].t <= tLook) { active = mid; lo = mid + 1; }
        else hi = mid - 1;
      }

      if (active !== lastActiveLine) {
        if (lastActiveLine >= 0 && lineEls[lastActiveLine]) {
          lineEls[lastActiveLine].classList.remove('active');
          lineEls[lastActiveLine].classList.add('past');

        lastActiveLine = active;

          if (!el) return;
          if (i < active) { el.classList.add('past'); el.classList.remove('active'); }

            el.classList.add('active'); el.classList.remove('past');

            const elTop = el.offsetTop - container.offsetTop;

            el.classList.remove('active', 'past');

    function resolveAssetUrl(image, appId) {
      if (!image) return null;
      // External image (Spotify, Steam, etc.) — strip the "mp:external/" prefix
      if (image.startsWith('mp:external/')) {
        const encoded = image.slice('mp:external/'.length);
        // The rest is a URL-encoded HTTPS URL embedded in the path
        const parts = encoded.split('/https/');
        if (parts.length > 1) return 'https://' + parts[1];
        return null;
      }
      // Spotify asset — shouldn't normally appear here but handle it
      if (image.startsWith('spotify:')) return null;
      // Standard Discord CDN asset
      if (appId) return `https://cdn.discordapp.com/app-assets/${appId}/${image}.png`;
      return null;

    function fmtElapsed(startMs) {

      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m elapsed`;
      if (m > 0) return `${m}m ${s % 60}s elapsed`;
      return `${s}s elapsed`;
    }

    function fmtDuration(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}:${String(m % 60).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
      return `${m}:${String(s % 60).padStart(2,'0')}`;
    }

    function buildActivityBlock(act, idx) {
      const wrap = document.createElement('div');
      wrap.className = 'rich-act show';
      wrap.id = `richAct_${idx}`;

      const largeUrl  = resolveAssetUrl(act.assets?.large_image, act.application_id);
      const smallUrl  = resolveAssetUrl(act.assets?.small_image, act.application_id);
      const largeTip  = act.assets?.large_text  || act.name || '';
      const smallTip  = act.assets?.small_text  || '';
      const label     = TYPE_LABEL[act.type] || 'doing';
      const hasStart  = act.timestamps?.start != null;
      const hasEnd    = act.timestamps?.end   != null;
      const startMs   = act.timestamps?.start;
      const endMs     = act.timestamps?.end;

      wrap.innerHTML = `
        <div class="rich-act-top">
          <div class="rich-act-imgs" title="${largeTip}">
            <div class="rich-act-large" id="richLarge_${idx}">${largeUrl ? '' : '🎮'}</div>
            <div class="rich-act-small${smallUrl ? ' show' : ''}" id="richSmall_${idx}" title="${smallTip}"></div>
          </div>
          <div class="rich-act-info">
            <div class="rich-act-label">${label}</div>
            <div class="rich-act-name">${act.name || ''}</div>
            ${act.details ? `<div class="rich-act-detail" id="richDetail_${idx}">${act.details}</div>` : ''}
            ${act.state   ? `<div class="rich-act-state"  id="richState_${idx}">${act.state}</div>`   : ''}
            ${hasStart    ? `<div class="rich-act-elapsed" id="richElapsed_${idx}"></div>` : ''}
          </div>
        </div>
        ${(hasStart && hasEnd) ? `
        <div class="rich-act-bar-wrap show">
          <div class="rich-act-bar-fill" id="richBar_${idx}"></div>
        </div>` : ''}
      `;

      // Load images after building DOM so fallback emoji is visible immediately
      if (largeUrl) {
        const img = new Image();
        img.onload = () => {
          const el = wrap.querySelector(`#richLarge_${idx}`);
          if (el) { el.innerHTML = ''; el.appendChild(img); }
        };
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.alt = largeTip;
        img.src = largeUrl;
      }
      if (smallUrl) {
        const sImg = new Image();
        sImg.onload = () => {
          const el = wrap.querySelector(`#richSmall_${idx}`);
          if (el) { el.classList.add('show'); el.innerHTML = ''; el.appendChild(sImg); }
        };
        sImg.style.cssText = 'width:100%;height:100%;object-fit:cover;';
        sImg.alt = smallTip;
        sImg.src = smallUrl;
      }

      // Elapsed timer — runs every second
      if (hasStart) {
        const elapsedEl = wrap.querySelector(`#richElapsed_${idx}`);
        if (elapsedEl) {
          elapsedEl.textContent = fmtElapsed(startMs);
          const tid = setInterval(() => {
            if (!document.body.contains(elapsedEl)) { clearInterval(tid); return; }
            elapsedEl.textContent = fmtElapsed(startMs);
            // Progress bar if we also have an end time
            if (hasEnd) {
              const total = endMs - startMs;
              const gone  = Date.now() - startMs;
              const pct   = Math.min(100, Math.max(0, (gone / total) * 100));
              const barEl = wrap.querySelector(`#richBar_${idx}`);
              if (barEl) barEl.style.width = pct + '%';
            }
          }, 1000);
          activityTimers.push(tid);
        }
      }

      return wrap;
    }

    function renderActivities(activities) {
      // Clear old timers and blocks
      activityTimers.forEach(clearInterval);
      activityTimers = [];
      const wrap = document.getElementById('activityWrap');
      if (!wrap) return;
      wrap.innerHTML = '';

      // Filter: exclude custom status (type 4) and Spotify (handled separately)
      const acts = (activities || []).filter(a => a.type !== 4 && a.name !== 'Spotify');
      acts.slice(0, 2).forEach((act, i) => {
        wrap.appendChild(buildActivityBlock(act, i));
      });
    }

    function applyData(d) {
      const u = d.discord_user;
      if (u?.avatar) {
        const ext = u.avatar.startsWith('a_') ? 'gif' : 'png';
        document.getElementById('avatarEl').innerHTML = `<img src="https://cdn.discordapp.com/avatars/${USER_ID}/${u.avatar}.${ext}?size=128" alt="avatar">`;
      }
      // banner_color fallback from WS if API fetch didn't get a banner image
      if (u?.banner_color) applyBannerColor(u.banner_color);

      // Status dot
      const s = d.discord_status || 'offline';
      document.getElementById('statusDot').className = 'status-dot ' + s;

      // Custom status (type 4)
      const custom = (d.activities || []).find(a => a.type === 4);
      const statusEl = document.getElementById('statusText');
      if (custom) {
        const parts = [custom.emoji?.name, custom.state].filter(Boolean);
        statusEl.textContent = parts.length ? parts.join(' ') : '';
        statusEl.style.display = parts.length ? '' : 'none';
      } else {
        statusEl.style.display = 'none';
      }

      // Spotify block
      const spotBlock = document.getElementById('spotBlock');
      if (d.spotify) {
        spotBlock.classList.add('show');
        document.getElementById('trackName').textContent   = d.spotify.song   || '';
        document.getElementById('trackArtist').textContent = d.spotify.artist || '';
      } else {
        spotBlock.classList.remove('show');
      }

      // Rich game/app activities
      renderActivities(d.activities);
    }

    function connectLanyard() {
      let heartbeat;
      const ws = new WebSocket('wss://api.lanyard.rest/socket');
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.op === 1) {
          heartbeat = setInterval(() => { if (ws.readyState === 1) ws.send(JSON.stringify({ op: 3 })); }, msg.d.heartbeat_interval);
          ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: USER_ID } }));
        }
        if (msg.op === 0 && msg.d) applyData(msg.d);
      };
      ws.onerror = () => clearInterval(heartbeat);
      ws.onclose = () => { clearInterval(heartbeat); setTimeout(connectLanyard, 5000); };
    }

    // ── CUSTOM CURSOR ─────────────────────────────────────────────────────────
    const cursorEl = document.getElementById('customCursor');
    let cx = -100, cy = -100;
    let trailQueue = [];

    document.addEventListener('mousemove', e => {
      cx = e.clientX; cy = e.clientY;
      cursorEl.style.left = cx + 'px';
      cursorEl.style.top = cy + 'px';
      spawnParticle(cx, cy);
    });

    document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
    document.addEventListener('mouseup', () => cursorEl.classList.remove('clicking'));

    const STAR_COLORS = ['#ffffff', '#e8e4ff', '#c8d8ff', '#ffd6f0', '#fffacd', '#d0f0ff'];
    const STAR_SHAPES = ['✦', '·', '⋆', '✧', '*', '•', '◦', '∘'];
    let lastParticle = 0;
    let mouseVx = 0, mouseVy = 0, lastMx = 0, lastMy = 0;

    function spawnParticle(x, y) {
      const now = Date.now();
      const speed = Math.hypot(x - lastMx, y - lastMy);
      lastMx = x; lastMy = y;

      // Throttle based on speed — faster mouse = more particles
      const delay = speed > 10 ? 12 : speed > 4 ? 22 : 35;
      if (now - lastParticle < delay) return;
      lastParticle = now;

      // Spawn 2-5 particles per frame depending on speed
      const count = speed > 15 ? 5 : speed > 8 ? 3 : 2;

      for (let k = 0; k < count; k++) {
        const p = document.createElement('div');
        p.className = 'cursor-particle';
        const isTail = k === 0;
        const size = isTail ? (6 + Math.random() * 8) : (2 + Math.random() * 5);
        const color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
        const shape = isTail ? (Math.random() > 0.5 ? '✦' : '✧') : STAR_SHAPES[Math.floor(Math.random() * STAR_SHAPES.length)];
        const dx = (Math.random() - 0.5) * 20;
        const dy = (Math.random() - 0.5) * 20 - Math.random() * 8;
        const dur = isTail ? (0.55 + Math.random() * 0.35) : (0.3 + Math.random() * 0.4);

        p.style.cssText = `
          left:${x + (Math.random()-0.5)*6}px;
          top:${y + (Math.random()-0.5)*6}px;
          width:${size}px; height:${size}px;
          font-size:${size}px; line-height:1;
          color:${color};
          text-shadow: 0 0 ${isTail ? 8 : 4}px ${color}, 0 0 ${isTail ? 16 : 6}px ${color}88;
          display:flex; align-items:center; justify-content:center;
          --dx:${dx}px; --dy:${dy}px;
          animation: particle-fade ${dur}s ease-out forwards;
          background: none;
          opacity: ${isTail ? 1 : 0.7 + Math.random() * 0.3};
        `;
        p.textContent = shape;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), dur * 1000 + 50);
      }

      // Occasionally spawn a larger "comet streak" particle
      if (speed > 12 && Math.random() > 0.6) {
        const c = document.createElement('div');
        c.className = 'cursor-particle';
        const cSize = 10 + Math.random() * 8;
        const cColor = Math.random() > 0.5 ? '#ffffff' : '#e0d8ff';
        c.style.cssText = `
          left:${x}px; top:${y}px;
          width:${cSize}px; height:${cSize}px;
          font-size:${cSize}px; line-height:1;
          color:${cColor};
          text-shadow: 0 0 12px ${cColor}, 0 0 24px ${cColor}66;
          display:flex; align-items:center; justify-content:center;
          animation: comet-tail 0.4s ease-out forwards;
          background: none;
        `;
        c.textContent = '★';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 450);
      }
    }

    // ── VOLUME SLIDER ────────────────────────────────────────────────────────
    const volSlider = document.getElementById('volSlider');
    volSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volSlider.value);
    });

    // ── DISABLE RIGHT-CLICK & KEYBOARD SHORTCUTS ──────────────────────────────
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && ['u','s','a','c','i','j'].includes(e.key.toLowerCase())) e.preventDefault();
      if (e.key === 'F12') e.preventDefault();
    });

    // ── MOBILE DETECTION ──────────────────────────────────────────────────────
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) document.body.classList.add('is-mobile');

    // ── DRAWER ────────────────────────────────────────────────────────────────
    function toggleDrawer() {
      const drawer  = document.getElementById('mobDrawer');
      const overlay = document.getElementById('mobOverlay');
      const isOpen  = drawer.classList.contains('open');
      if (isOpen) { closeDrawer(); } else { openDrawer(); }
    }
    function openDrawer() {
      document.getElementById('mobOverlay').classList.add('open');
      document.getElementById('mobDrawer').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('mobOverlay').classList.remove('open');
      document.getElementById('mobDrawer').classList.remove('open');
    }

    // ── PRELOADER ─────────────────────────────────────────────────────────────
    // Track all assets that must load before "click to enter" is shown
    // Each task has a weight (total = 100) and a done flag
    const LOAD_TASKS = {
      fonts:   { weight: 8,  done: false, label: 'loading fonts'        },
      video:   { weight: 18, done: false, label: 'loading video'         },
      audio0:  { weight: 22, done: false, label: 'buffering trust'       },
      audio1:  { weight: 22, done: false, label: 'buffering lust for life' },
      audio2:  { weight: 22, done: false, label: 'buffering die for you' },
      lyrics:  { weight: 5,  done: false, label: 'syncing lyrics'        },
      dom:     { weight: 3,  done: false, label: 'rendering'             },
    };

    let _loadReady = false;

    function getProgress() {
      let done = 0, total = 0;
      for (const k in LOAD_TASKS) {
        total += LOAD_TASKS[k].weight;
        if (LOAD_TASKS[k].done) done += LOAD_TASKS[k].weight;
      }
      return Math.round((done / total) * 100);
    }

    function getCurrentLabel() {
      // Return the label of the first incomplete task
      for (const k in LOAD_TASKS) {
        if (!LOAD_TASKS[k].done) return LOAD_TASKS[k].label;
      }
      return 'finished loading awesomeness';
    }

    function tickLoader() {
      const pct = getProgress();
      const bar   = document.getElementById('splashBar');
      const label = document.getElementById('splashLabel');
      if (bar)   bar.style.width = pct + '%';
      if (label) label.textContent = getCurrentLabel();
    }

    function markDone(key) {
      if (LOAD_TASKS[key] && !LOAD_TASKS[key].done) {
        LOAD_TASKS[key].done = true;
        tickLoader();
        checkAllDone();
      }
    }

    function checkAllDone() {
      const allDone = Object.values(LOAD_TASKS).every(t => t.done);
      if (allDone && !_loadReady) {
        _loadReady = true;
        onLoadComplete();
      }
    }

    function onLoadComplete() {
      const splash    = document.getElementById('splash');
      const splashTxt = document.getElementById('splashText');
      const bar       = document.getElementById('splashBar');
      const label     = document.getElementById('splashLabel');

      // Final bar fill
      if (bar)   { bar.style.width = '100%'; bar.classList.add('done'); }
      if (label) { label.textContent = 'finished loading awesomeness'; label.classList.add('done'); }

      // Short pause then unlock click
      setTimeout(() => {
        if (splashTxt) { splashTxt.textContent = 'click to enter'; splashTxt.classList.add('ready'); }
        if (splash)    { splash.classList.add('ready'); splash.addEventListener('click', enter, { once: true }); }
      }, 700);
    }

    // ── PRELOAD ASSETS ────────────────────────────────────────────────────────

    // 1. Fonts — use FontFace API or fallback via document.fonts.ready
    document.fonts.ready.then(() => markDone('fonts')).catch(() => markDone('fonts'));

    // 2. Background video
    (function preloadVideo() {
      const vid = document.getElementById('bgVideo');
      if (!vid) { markDone('video'); return; }
      // readyState 3 = HAVE_FUTURE_DATA, 4 = HAVE_ENOUGH_DATA
      if (vid.readyState >= 3) { markDone('video'); return; }
      const onReady = () => { markDone('video'); vid.removeEventListener('canplaythrough', onReady); };
      vid.addEventListener('canplaythrough', onReady);
      // Safety timeout — don't block on slow CDN
      setTimeout(() => markDone('video'), 8000);
    })();

    // 3. Audio preloading — one Audio element per song, buffered in parallel
    (function preloadAudios() {
      const keys = ['audio0', 'audio1', 'audio2'];
      SONGS.forEach((song, idx) => {
        const key = keys[idx] || ('audio' + idx);
        if (!song.src) { markDone(key); return; }

        const a = new Audio();
        a.preload = 'auto';
        a.crossOrigin = 'anonymous';
        a.src = song.src;
        preloadedAudio[idx] = a;

        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          markDone(key);
        };

        // canplaythrough = enough buffered to play without interruption
        a.addEventListener('canplaythrough', finish, { once: true });
        a.addEventListener('error', finish, { once: true });

        // Safety timeout — don't block forever on slow CDN (20s per track)
        setTimeout(finish, 20000);
        a.load();
      });
    })();

    // 4. Lyrics pre-validation — verify all timestamps are valid numbers
    (function validateLyrics() {
      let ok = true;
      for (const song of SONGS) {
        if (!Array.isArray(song.lyrics)) { ok = false; break; }
        for (const line of song.lyrics) {
          if (typeof line.t !== 'number' || isNaN(line.t) || typeof line.text !== 'string') {
            ok = false; break;
          }
        }
        if (!ok) break;
      }
      // Lyrics are in-memory JS — always instant, but give it a tick to be thorough
      requestAnimationFrame(() => markDone('lyrics'));
    })();

    // 5. DOM ready
    if (document.readyState === 'complete') {
      markDone('dom');
    } else {
      window.addEventListener('load', () => markDone('dom'), { once: true });
    }

    // Kick off initial progress tick so bar isn't empty on first render
    requestAnimationFrame(tickLoader);

    // ── ENTER ─────────────────────────────────────────────────────────────────
    function enter() {
      if (!_loadReady) return;
      document.getElementById('splash').classList.add('hidden');
      const vid = document.getElementById('bgVideo');
      vid.play().catch(() => {});
      setTimeout(() => vid.classList.add('show'), 100);
      setTimeout(() => {
        document.getElementById('main').classList.add('visible');
        if (isMobile) {
          document.getElementById('mobTrigger').classList.add('visible');
        } else {
          document.getElementById('sidebar').classList.add('visible');
        }
        connectLanyard();
        buildVisualizer();
        // Pick a random song, set it up BEFORE creating AudioContext
        // so audio.src is set before createMediaElementSource
        currentSong = Math.floor(Math.random() * SONGS.length);
        loadSong(currentSong); // sets audio.src from preloadedAudio
        setupAudioContext();   // creates MediaElementSource from audio — must be after src set
        syncLoop();
        tickVisualizer();
        audio.play().then(() => {
          isPlaying = true;
          document.getElementById('playIcon').setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
        }).catch(() => {});
        setTimeout(typeQuote, 800);
      }, 500);
    }
  </script>
